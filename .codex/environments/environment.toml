# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "flight-review-rs"

[setup]
script = '''
set -euo pipefail

CANONICAL_ROOT="$HOME/dc/flight-review-rs"

test -f "$CANONICAL_ROOT/.env"
test -d "$CANONICAL_ROOT/data/files"

install -m 600 "$CANONICAL_ROOT/.env" .env

cargo fetch --locked
npm --prefix frontend ci'''

[[actions]]
name = "Start"
icon = "tool"
command = '''
#!/usr/bin/env bash
set -euo pipefail

CANONICAL_ROOT="$HOME/dc/flight-review-rs"
SHARED_DATA="$CANONICAL_ROOT/data"

if [[ -f .env ]]; then
  set -a
  source .env
  set +a
fi

cargo run -p flight-review-server -- serve \
  --db "sqlite://$SHARED_DATA/flight-review.db?mode=rwc" \
  --storage "file://$SHARED_DATA/files" \
  --port 8080 &
backend_pid=$!

cleanup() {
  kill "$backend_pid" 2>/dev/null || true
}
trap cleanup EXIT INT TERM

until curl --fail --silent http://127.0.0.1:8080/health >/dev/null; do
  if ! kill -0 "$backend_pid" 2>/dev/null; then
    wait "$backend_pid"
    exit 1
  fi
  sleep 0.5
done

npm --prefix frontend run dev -- --host 127.0.0.1'''
