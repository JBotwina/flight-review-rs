name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run check

      - name: Test
        working-directory: frontend
        env:
          NODE_OPTIONS: --no-experimental-webstorage
        run: npm test -- --run

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true  # fixtures are stored via Git LFS

      - run: rustup show  # installs version from rust-toolchain.toml

      - uses: Swatinem/rust-cache@v2

      - name: Run tests (all crates)
        run: cargo test --workspace

      - name: Check server (SQLite, default)
        run: cargo check -p flight-review-server

      - name: Check server (Postgres)
        run: cargo check -p flight-review-server --features postgres --no-default-features

      - name: Check server (all features)
        run: cargo check -p flight-review-server --features "postgres,s3"

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true  # fixtures are stored via Git LFS

      - run: rustup show  # installs version from rust-toolchain.toml

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release -p flight-review-server -p flight-review

      - name: Run integration test
        run: cargo test -p flight-review-server --test integration -- --nocapture
