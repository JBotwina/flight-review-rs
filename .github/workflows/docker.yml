name: Docker

on:
  # Only run when something that actually affects the image changes. The build
  # is the slowest job in CI (~8 min, full workspace recompile) and the image
  # is built-and-discarded on PRs (push: false), so running it on every change
  # was wasted time. release.yml still builds and publishes on version tags.
  pull_request:
    branches: [main, staging]
    paths:
      - '.dockerignore'
      - 'Dockerfile'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - 'frontend/**'
      - 'scripts/docker-entrypoint.sh'
      - 'scripts/seed-logs.sh'
      - 'seed/**'
      - 'railway.json'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

jobs:
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: flight-review:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify binaries exist in image
        run: |
          docker create --name test-container flight-review:test
          docker cp test-container:/usr/local/bin/flight-review-server /tmp/flight-review-server
          docker cp test-container:/usr/local/bin/ulog-convert /tmp/ulog-convert
          docker rm test-container
          file /tmp/flight-review-server
          file /tmp/ulog-convert

      - name: Verify server starts
        run: |
          docker run -d --name fr-test -p 9090:8080 flight-review:test
          sleep 3
          curl -sf http://localhost:9090/health | grep -q ok
          docker stop fr-test
          docker rm fr-test
