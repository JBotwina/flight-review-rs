name: flight-review

services:
  app:
    build:
      context: .
      args:
        SERVER_FEATURES: ${SERVER_FEATURES:-s3}
        PUBLIC_MAPBOX_TOKEN: ${PUBLIC_MAPBOX_TOKEN:-}
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///data/flight-review.db}
      STORAGE_URL: ${STORAGE_URL:-file:///data/files}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_URL_STYLE: ${S3_URL_STYLE:-}
      SEED_LOGS: ${SEED_LOGS:-true}
      SEED_LOGS_PUBLIC: ${SEED_LOGS_PUBLIC:-true}
      ACCESS_PASSWORD: ${ACCESS_PASSWORD:?Copy .env.example to .env and set ACCESS_PASSWORD}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?Copy .env.example to .env and set OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL:-openrouter/auto}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-PX4 Flight Review}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost:3000}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
    volumes:
      - flight-review-data:/data
    ports:
      - "${WEB_PORT:-3000}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  flight-review-data:
